<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Video Pop-Up</title>
    <style>
      *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
      html, body {
        width: 100%; height: 100%;
        background: #000;
        overflow: hidden;
        font-family: system-ui, sans-serif;
        cursor: pointer;
      }
      #video {
        display: block;
        width: 100%; height: 100%;
        object-fit: contain;
        background: #000;
        pointer-events: none;
      }
      body.cropped {
        overflow: hidden;
        position: relative;
      }
      body.cropped #video {
        /* overridden by inline style set from main process */
      }
    </style>
  </head>
  <body>
    <video id="video" muted playsinline></video>
    <script type="module" src="./src/popup.ts"></script>
  </body>
</html>
