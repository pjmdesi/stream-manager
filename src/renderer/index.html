<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Stream Manager</title>
    <link rel="icon" type="image/svg+xml" href="./src/assets/stream-manager-logo.svg" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Recursive:slnt,wght,CASL,CRSV,MONO@-15..0,300..800,0..1,0..1,0..1&display=swap"
      rel="stylesheet"
    />
    <style>
      @keyframes splash-pulse {
        0%, 100% { opacity: 1; transform: scale(1); }
        50%       { opacity: 0.6; transform: scale(0.94); }
      }
      #splash {
        position: fixed;
        inset: 0;
        z-index: 9999;
        background: #1a1a2e;
        display: flex;
        flex-direction: column;
        transition: opacity 400ms ease;
      }
      #splash.fade-out {
        opacity: 0;
        pointer-events: none;
      }
      #splash-titlebar {
        height: 40px;
        flex-shrink: 0;
        display: flex;
        align-items: center;
        justify-content: space-between;
        padding: 0 16px;
        border-bottom: 1px solid rgba(255,255,255,0.05);
        -webkit-app-region: drag;
      }
      #splash-title {
        display: flex;
        align-items: center;
        gap: 8px;
        font-family: 'Recursive', system-ui, sans-serif;
        font-size: 14px;
        font-weight: 600;
        color: #a78bfa;
        letter-spacing: 0.05em;
      }
      #splash-controls {
        display: flex;
        align-items: center;
        gap: 2px;
        -webkit-app-region: no-drag;
      }
      .splash-btn {
        width: 28px;
        height: 28px;
        border: none;
        background: transparent;
        color: #6b7280;
        border-radius: 4px;
        cursor: pointer;
        display: flex;
        align-items: center;
        justify-content: center;
        font-size: 13px;
        line-height: 1;
        transition: background 150ms, color 150ms;
      }
      .splash-btn:hover { background: rgba(255,255,255,0.1); color: #d1d5db; }
      .splash-btn.close:hover { background: #dc2626; color: #fff; }
      #splash-body {
        flex: 1;
        display: flex;
        align-items: center;
        justify-content: center;
      }
      #splash-logo {
        width: 72px;
        height: 72px;
        animation: splash-pulse 2s ease-in-out infinite;
      }
    </style>
  </head>
